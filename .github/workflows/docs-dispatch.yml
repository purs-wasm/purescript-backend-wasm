name: Trigger docs site rebuild

# When the documentation sources change on main, notify the separate docs-site repo
# (under the `purs-wasm` org) so it re-fetches this repo's `docs/` and re-renders them to
# its GitHub Pages site. We send a `repository_dispatch` event to that repo.
#
# Auth: the default `GITHUB_TOKEN` is scoped to THIS repo and cannot trigger a workflow in
# another repo (let alone another owner), so the dispatch is authenticated with a PAT that
# has `Contents: write` on the docs repo, stored here as the `DOCS_DISPATCH_TOKEN` secret.
# (A fine-grained PAT with resource owner = the `purs-wasm` org, limited to the docs repo,
# is the least-privilege choice; the org must permit fine-grained PATs.)
on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
  # Manual escape hatch: force a docs rebuild without a docs change.
  workflow_dispatch:

# This job only calls out to another repo via the PAT; it needs no write access to this one.
permissions: {}

# A burst of doc commits only needs one rebuild — collapse to the latest.
concurrency:
  group: docs-dispatch
  cancel-in-progress: true

jobs:
  notify-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch `docs-updated` to the docs site repo
        env:
          TOKEN: ${{ secrets.DOCS_DISPATCH_TOKEN }}
          # owner/name of the docs-site repo under the purs-wasm org.
          DOCS_REPO: purs-wasm/documentation
          SHA: ${{ github.sha }}
        run: |
          curl -sSf -X POST \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${DOCS_REPO}/dispatches" \
            -d "$(printf '{"event_type":"docs-updated","client_payload":{"sha":"%s"}}' "${SHA}")"
