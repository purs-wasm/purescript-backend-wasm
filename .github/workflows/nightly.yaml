name: Nightly

# Publish a nightly build of the `purs-wasm` npm package — but only when **explicitly opted in**, so a
# routine merge to `main` does NOT release. Opt in by including the marker `[nightly]` anywhere in the
# merge (squash) commit message of the PR; or run this workflow manually (workflow_dispatch). Without
# the marker the job is skipped. `npm install purs-wasm@nightly` then tracks the most recent nightly;
# the stable `latest` dist-tag is never touched — nightlies go out under the `nightly` tag with a
# unique pre-release version.
#
# Prerequisites (repository secrets):
#   - CACHIX_AUTH_TOKEN  (already used by CI) for the Nix build cache
#   (npm publish uses OIDC trusted publishing — no NPM_TOKEN needed.)
on:
  push:
    branches: [main]
  workflow_dispatch:

# One nightly at a time; do not cancel an in-flight publish.
concurrency:
  group: nightly
  cancel-in-progress: false

jobs:
  nightly:
    # Opt-in gate (see header): publish only when the push's head (merge/squash) commit message
    # contains the `[nightly]` marker, or when the workflow is dispatched manually. An unmarked
    # merge to `main` matches neither branch, so the job is skipped and nothing is published.
    # (The old docs-only skip is gone — it is redundant now that publishing is explicit opt-in.)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[nightly]')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      # Same Nix toolchain as CI — `nix develop` is the single source of truth (flake.nix/.lock),
      # and `prepack` (bundle + runtime + precompiled ulib) needs spago / purs / esbuild / binaryen.
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: experimental-features = nix-command flakes
      - uses: cachix/cachix-action@v17
        with:
          name: purs-wasm
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - uses: nicknovitski/nix-develop@v1

      - name: Install deps
        run: pnpm install

      # Smoke test before publishing, in case something reached `main` without a green CI run.
      - name: Test
        run: pnpm -F ./purs-wasm run test

      # `0.0.0-nightly.<yyyymmdd>.g<short-sha>`. npm requires a semver `MAJOR.MINOR.PATCH` prefix, so
      # a bare `nightly.<date>.<sha>` is not a legal version; we use a **fixed `0.0.0` base** rather
      # than guessing the next release's bump (it may be patch/minor/major — not deterministic). The
      # meaningful identity is the `nightly.<date>.g<sha>` pre-release tag (the short SHA makes it
      # unique per commit; the `g` prefix — git-describe convention — keeps that identifier
      # alphanumeric, so an all-digit SHA can't form an illegal leading-zero numeric identifier).
      # Consumers fetch it via the `nightly` **dist-tag** (`npm install purs-wasm@nightly`), not via a
      # semver range — `0.0.0-*` is excluded from `^x.y.z` ranges and never shadows the stable
      # `latest`. `--tag nightly` (below) points `@nightly` at the most recently published one
      # regardless of version ordering.
      - name: Compute nightly version
        id: ver
        run: |
          version="0.0.0-nightly.$(date -u +%Y%m%d).g${GITHUB_SHA::7}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "nightly version: $version"

      # Bump package.json (no git commit/tag — this workspace only). The repo `.npmrc` sets
      # `ignore-scripts`, which suppresses the `version` lifecycle script, so bake `Version.js`
      # explicitly here (it is what the CLI reports as its version, and what `prepack` compiles in).
      - name: Set version
        working-directory: purs-wasm
        run: |
          npm version "${{ steps.ver.outputs.version }}" --no-git-tag-version
          printf 'export const version = "v%s"\n' "${{ steps.ver.outputs.version }}" > src/PursWasm/CLI/Version.js

      # `ignore-scripts` (above) also suppresses `prepack` on `npm publish`, so assemble the package
      # — bundle/ + runtime/ + lib/ — with an explicit `npm run`, which is not suppressed.
      - name: Assemble package
        working-directory: purs-wasm
        run: npm run prepack

      # `--tag nightly` keeps the stable `latest` tag in place; OIDC trusted publishing needs no token.
      - name: Publish nightly
        working-directory: purs-wasm
        run: npm publish --tag nightly --access public
